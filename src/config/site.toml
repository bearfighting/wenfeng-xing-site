[config.site]
title = "Wenfeng Xing"
description = "Personal website of Wenfeng Xing, focused on software, finance, and long-term thinking."
pageTitle = "Wenfeng | Personal Space"
pageDescription = "Projects, writing, and experiments about software, finance, and long-term decision-making."
repository = "https://github.com/bearfighting/wenfeng-xing-site"
footerNote = "Built in public with patience and long-term curiosity."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.math]
render = "katex" # "katex" | "mathjax"

[config.comments]
enabled = false
provider = "none"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Wenfeng Xing"
handle = "Software Engineer"
role = "Building for the long term."
company = ""
location = "Montreal, Canada"
email = "wenfengxing@wenfengxing.com"
website = "https://wenfengxing.com/"
github = "https://github.com/bearfighting"
meta = "Software x Finance x Knowledge"
avatar = "/images/wenfeng-logo.png"

